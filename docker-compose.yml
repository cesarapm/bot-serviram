services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3020:9000"
    volumes:
      - .:/var/www
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: php artisan serve --host=0.0.0.0 --port=8000
    restart: unless-stopped

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: php artisan reverb:start --host=0.0.0.0 --port=8072 --no-interaction
    ports:
      - "8072:8072"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: